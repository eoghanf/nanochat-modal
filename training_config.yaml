# training_config.yaml — hyperparameters for scripts/base_train.py
# CLI arguments override these values when explicitly passed.
# Null (~) means "use the argparse built-in default".

# --------------------
# Logging
# --------------------
run: "speedrun-v2"             # wandb run name ("dummy" = no logging)
wandb_group: ~                 # wandb group (null = no grouping; set e.g. "bench-1000" to group related runs)

# --------------------
# Model architecture
# --------------------
depth: 24                   # transformer depth (main complexity dial)
aspect_ratio: 64            # model_dim = depth * aspect_ratio
head_dim: 128               # attention head dimension
max_seq_len: 2048           # context length
window_pattern: "SSSL"      # L = full context, S = sliding window (half)

# --------------------
# Training horizon (first non -1 value takes precedence)
# --------------------
num_iterations: -1          # explicit step count (-1 = disabled)
target_flops: -1.0          # compute budget in FLOPs (-1 = disabled)
target_param_data_ratio: 8.0  # tokens-to-params ratio (Chinchilla = 20, speedrun = 8)

# --------------------
# Batch size
# --------------------
device_batch_size: 16       # per-GPU batch size (lower to 8/4/2/1 if OOM)
total_batch_size: -1        # total tokens/step (-1 = auto-compute optimal)

# --------------------
# Learning rates
# --------------------
embedding_lr: 0.3           # Adam LR for embedding parameters
unembedding_lr: 0.008       # Adam LR for unembedding / lm_head
matrix_lr: 0.02             # Muon LR for transformer weight matrices
scalar_lr: 0.5              # Adam LR for scalars (resid_lambdas, x0_lambdas)
weight_decay: 0.28          # Muon weight decay (auto-scaled with batch size & depth)

# --------------------
# LR schedule
# --------------------
warmup_steps: 40            # linear warmup duration (steps)
warmdown_ratio: 0.65        # fraction of total steps spent in warmdown
final_lr_frac: 0.05         # final LR as a fraction of peak LR

# --------------------
# Evaluation & checkpointing
# --------------------
eval_every: 250             # validation BPB every N steps (-1 = disabled)
eval_tokens: 41943040       # tokens evaluated per validation pass (80 × 524288)
core_metric_every: 2000     # DCLM CORE metric every N steps (-1 = disabled)
core_metric_max_per_task: 500  # examples per task for CORE evaluation
sample_every: 2000          # sample from model every N steps (-1 = disabled)
save_every: -1              # checkpoint every N steps (-1 = only at end)
resume_from_step: -1        # resume from step N (-1 = no resume)

# --------------------
# FP8 training (H100+ only)
# --------------------
fp8: true                   # enable FP8 training (use --no-fp8 to disable)
fp8_recipe: "tensorwise"    # "tensorwise" (faster) or "rowwise" (more accurate)

# --------------------
# Hardware / runtime
# --------------------
device_type: ""             # cuda | cpu | mps (empty = autodetect)
model_tag: ~                # checkpoint dir name (null = d{depth}, e.g. d24)
